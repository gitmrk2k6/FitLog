services:
  db:
    image: postgres:17
    container_name: fitlog-db
    environment:
      POSTGRES_USER: fitlog
      POSTGRES_PASSWORD: fitlog
      POSTGRES_DB: fitlog
    ports:
      - "5432:5432"
    volumes:
      - fitlog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitlog -d fitlog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fitlog_pgdata:
