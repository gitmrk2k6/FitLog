          type: boolean
          title: Achieved
          description: 達成済みか（超過も達成扱い）
        period_start:
          type: string
          format: date
          title: Period Start
          description: 期間開始日（含む）
        period_end:
          type: string
          format: date
          title: Period End
          description: 期間終了日（排他、次期間の開始日）
