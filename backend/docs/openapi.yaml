openapi: 3.1.0
info:
  title: FitLog API
  description: '

    FitLog は筋トレ・運動記録サービスの REST API です。


    ## 認証

    保護エンドポイントは Bearer トークン（JWT）を要求します。

    `/auth/login` で取得したトークンを `Authorization: Bearer <token>` ヘッダに付与してください。


    ## 共通エラーレスポンス

    | ステータス | 意味 |

    |---|---|

    | 401 | 未認証（トークン不正・期限切れ） |

    | 403 | 権限なし（他ユーザーのリソースへのアクセス等） |

    | 404 | リソースが見つからない |

    | 409 | 重複登録（メール・ユーザー名等） |

    | 422 | バリデーションエラー |

    '
  version: 0.1.0
paths:
  /auth/register:
    post:
      tags:
      - auth
      summary: 新規ユーザー登録
      description: ユーザー名・メールアドレス・パスワードで新規アカウントを作成します。パスワードは8文字以上で英字と数字を含む必要があります。
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '409':
          description: メールアドレスまたはユーザー名が既に使用済み
        '422':
          description: バリデーションエラー（パスワード強度不足など）
  /auth/login:
    post:
      tags:
      - auth
      summary: ログイン（JWTトークン取得）
      description: 'メールアドレスとパスワードで認証し、JWT アクセストークンを返します。以降のリクエストは `Authorization:
        Bearer <token>` ヘッダを付与してください。'
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: メールアドレスまたはパスワードが無効
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - auth
      summary: ログアウト
      description: JWT はステートレスのため、クライアント側でトークンを破棄します。サーバー側での処理はありません。
      operationId: logout_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Logout Auth Logout Post
  /auth/me:
    get:
      tags:
      - auth
      summary: ログイン中ユーザーの情報取得
      description: Bearer トークンに紐づくログイン中ユーザーの情報を返します。
      operationId: me_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '401':
          description: 未認証（トークン不正または期限切れ）
      security:
      - OAuth2PasswordBearer: []
  /exercises:
    get:
      tags:
      - exercises
      summary: 種目一覧取得（共通 + 自作）
      description: 共通種目と、ログインユーザーが作成したカスタム種目の一覧を返します。
      operationId: list_exercises_exercises_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ExerciseOut'
                type: array
                title: Response List Exercises Exercises Get
        '401':
          description: 未認証
      security:
      - OAuth2PasswordBearer: []
    post:
      tags:
      - exercises
      summary: カスタム種目を作成
      description: ログインユーザー専用のカスタム種目を新規作成します。同名の種目が既に存在する場合は 409 を返します。
      operationId: create_exercise_exercises_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseOut'
        '401':
          description: 未認証
        '409':
          description: 同名の種目が既に存在する
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /workouts:
    post:
      tags:
      - workouts
      summary: ワークアウット記録を作成
      description: 実施日・種目×セット構成・メモを指定してワークアウット記録を新規作成します。自己ベスト（PR）が更新された場合は `pr_updates`
        に指標が返ります（F-09）。
      operationId: create_workout_workouts_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          description: 未認証
        '422':
          description: 指定した種目IDにアクセス権限がない
    get:
      tags:
      - workouts
      summary: 自分のワークアウット一覧取得
      description: ログインユーザー自身のワークアウット記録を実施日降順で返します（F-03）。`limit` / `offset` でページネーション可能です。
      operationId: list_workouts_workouts_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: 取得件数上限（1〜100、デフォルト20）
          default: 20
          title: Limit
        description: 取得件数上限（1〜100、デフォルト20）
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: 取得オフセット（デフォルト0）
          default: 0
          title: Offset
        description: 取得オフセット（デフォルト0）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSummary'
                title: Response List Workouts Workouts Get
        '401':
          description: 未認証
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /workouts/{workout_id}:
    get:
      tags:
      - workouts
      summary: ワークアウット詳細取得
      description: 指定した ID のワークアウット記録の詳細（全セット・ボリューム・ナイストレ数・アドバイス数）を返します。
      operationId: get_workout_workouts__workout_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのワークアウットへのアクセス
        '404':
          description: ワークアウットが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - workouts
      summary: ワークアウット記録を更新（全置換）
      description: 実施日・種目構成・メモ・写真URLをまとめて差し替えます。部分更新は非対応です。
      operationId: update_workout_workouts__workout_id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのワークアウットへの操作
        '404':
          description: ワークアウットが見つからない
        '422':
          description: 指定した種目IDにアクセス権限がない
    delete:
      tags:
      - workouts
      summary: ワークアウット記録を削除
      description: 指定した ID のワークアウット記録（関連セット・写真含む）を完全に削除します。
      operationId: delete_workout_workouts__workout_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのワークアウットへの操作
        '404':
          description: ワークアウットが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /workouts/{workout_id}/photo:
    put:
      tags:
      - photos
      summary: ワークアウットに写真をアップロード
      description: JPEG / PNG / GIF のいずれか、最大5MB のファイルをワークアウットに紐づけます。既存写真がある場合は上書きされます（F-10）。
      operationId: upload_photo_workouts__workout_id__photo_put
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_photo_workouts__workout_id__photo_put'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのワークアウットへの操作
        '404':
          description: ワークアウットが見つからない
        '422':
          description: ファイル形式が不正またはサイズ超過（5MB 以上）
    delete:
      tags:
      - photos
      summary: ワークアウットの写真を削除
      description: ワークアウットに紐づく写真を削除します。ストレージ上のファイルも合わせて削除されます（F-10）。
      operationId: delete_photo_workouts__workout_id__photo_delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDetail'
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのワークアウットへの操作
        '404':
          description: ワークアウットが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /workouts/{workout_id}/cheers:
    post:
      tags:
      - cheers
      summary: ナイストレを付与
      description: 指定ワークアウットにナイストレ（いいね）を付与します。自分のワークアウットには付与できません（F-04）。
      operationId: add_cheer_workouts__workout_id__cheers_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheerStateOut'
        '401':
          description: 未認証
        '403':
          description: 自分のワークアウットへのナイストレは不可
        '404':
          description: ワークアウットが見つからない
        '409':
          description: 既にナイストレ済み
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - cheers
      summary: ナイストレを解除
      description: 指定ワークアウットに付与済みのナイストレを解除します（F-04）。
      operationId: remove_cheer_workouts__workout_id__cheers_delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: 未認証
        '403':
          description: 自分のワークアウットへの操作は不可
        '404':
          description: ワークアウットが見つからない、またはナイストレしていない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /workouts/{workout_id}/advices:
    post:
      tags:
      - advices
      summary: アドバイスを投稿
      description: 指定ワークアウットにアドバイスコメントを投稿します。自分のワークアウットへは投稿できません（F-05）。
      operationId: create_advice_workouts__workout_id__advices_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdviceCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdviceOut'
        '401':
          description: 未認証
        '403':
          description: 自分のワークアウットへのアドバイスは不可
        '404':
          description: ワークアウットが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - advices
      summary: ワークアウットのアドバイス一覧取得
      description: 指定ワークアウットに投稿されたアドバイスを投稿日時昇順で返します（F-05）。
      operationId: list_advices_workouts__workout_id__advices_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: workout_id
        in: path
        required: true
        schema:
          type: integer
          title: Workout Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdviceOut'
                title: Response List Advices Workouts  Workout Id  Advices Get
        '401':
          description: 未認証
        '404':
          description: ワークアウットが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /advices/{advice_id}:
    delete:
      tags:
      - advices
      summary: アドバイスを削除（投稿者のみ可）
      description: 自分が投稿したアドバイスを削除します。他ユーザーのアドバイスは削除できません（F-05）。
      operationId: delete_advice_advices__advice_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: advice_id
        in: path
        required: true
        schema:
          type: integer
          title: Advice Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: 未認証
        '403':
          description: 他ユーザーのアドバイスへの操作は不可
        '404':
          description: アドバイスが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/search:
    get:
      tags:
      - users
      summary: ユーザー名でユーザーを検索
      description: クエリ文字列 `q` に部分一致するユーザー名を持つユーザーを返します（F-06）。
      operationId: search_users_users_search_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: 検索キーワード（1文字以上）
          title: Q
        description: 検索キーワード（1文字以上）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBrief'
                title: Response Search Users Users Search Get
        '401':
          description: 未認証
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}:
    get:
      tags:
      - users
      summary: ユーザープロフィール取得
      description: 指定ユーザーのプロフィール情報（フォロー数・フォロワー数・フォロー関係）を返します（F-06）。
      operationId: get_profile_users__user_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileOut'
        '401':
          description: 未認証
        '404':
          description: ユーザーが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/following:
    get:
      tags:
      - users
      summary: フォロー中ユーザー一覧取得
      description: 指定ユーザーがフォローしているユーザーの一覧を返します（F-06）。
      operationId: list_following_users__user_id__following_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBrief'
                title: Response List Following Users  User Id  Following Get
        '401':
          description: 未認証
        '404':
          description: ユーザーが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/followers:
    get:
      tags:
      - users
      summary: フォロワー一覧取得
      description: 指定ユーザーをフォローしているユーザーの一覧を返します（F-06）。
      operationId: list_followers_users__user_id__followers_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBrief'
                title: Response List Followers Users  User Id  Followers Get
        '401':
          description: 未認証
        '404':
          description: ユーザーが見つからない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/follow:
    post:
      tags:
      - users
      summary: ユーザーをフォロー
      description: 指定ユーザーをフォローします。自分自身はフォローできません（F-06）。
      operationId: follow_user_users__user_id__follow_post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowStateOut'
        '401':
          description: 未認証
        '404':
          description: ユーザーが見つからない
        '409':
          description: 既にフォロー済み
        '422':
          description: 自分自身はフォロー不可
    delete:
      tags:
      - users
      summary: フォローを解除
      description: 指定ユーザーのフォローを解除します（F-06）。
      operationId: unfollow_user_users__user_id__follow_delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: 未認証
        '404':
          description: ユーザーが見つからない、またはフォローしていない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /feed:
    get:
      tags:
      - feed
      summary: フォロー中ユーザーのワークアウットフィード取得
      description: フォロー中のユーザーが投稿したワークアウットを実施日降順で返します。`limit` / `offset` でページネーション可能です（F-06）。
      operationId: get_feed_feed_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: 取得件数上限（1〜100、デフォルト20）
          default: 20
          title: Limit
        description: 取得件数上限（1〜100、デフォルト20）
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: 取得オフセット（デフォルト0）
          default: 0
          title: Offset
        description: 取得オフセット（デフォルト0）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutSummary'
                title: Response Get Feed Feed Get
        '401':
          description: 未認証
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /goals:
    get:
      tags:
      - goals
      summary: 目標一覧取得（週次・月次）
      description: ログインユーザーが設定した週次・月次の目標一覧を返します（F-07）。
      operationId: list_goals_goals_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GoalOut'
                type: array
                title: Response List Goals Goals Get
        '401':
          description: 未認証
      security:
      - OAuth2PasswordBearer: []
    put:
      tags:
      - goals
      summary: 目標を設定（upsert）
      description: 期間種別・指標・目標値で目標を設定します。既存の目標がある場合は上書き（upsert）します（F-07）。
      operationId: set_goal_goals_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalOut'
        '401':
          description: 未認証
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /goals/{period_type}:
    delete:
      tags:
      - goals
      summary: 目標を削除
      description: 指定した期間種別（weekly / monthly）の目標を削除します（F-07）。
      operationId: delete_goal_goals__period_type__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: period_type
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PeriodTypePath'
      responses:
        '204':
          description: Successful Response
        '401':
          description: 未認証
        '404':
          description: 指定した期間の目標が設定されていない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /goals/{period_type}/trend:
    get:
      tags:
      - goals
      summary: 目標達成率の推移データ取得
      description: 指定した期間種別の過去N期間分（デフォルト8）の達成率推移を返します。グラフ表示に使用します（F-07）。
      operationId: goal_trend_goals__period_type__trend_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: period_type
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/PeriodTypePath'
      - name: count
        in: query
        required: false
        schema:
          type: integer
          maximum: 24
          minimum: 1
          description: 取得する期間数（1〜24、デフォルト8）
          default: 8
          title: Count
        description: 取得する期間数（1〜24、デフォルト8）
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AchievementPointOut'
                title: Response Goal Trend Goals  Period Type  Trend Get
        '401':
          description: 未認証
        '404':
          description: 指定した期間の目標が設定されていない
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /dashboard/personal-records:
    get:
