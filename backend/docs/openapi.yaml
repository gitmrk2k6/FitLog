      description: 現在期間（今週/今月）の達成状況。
    AchievementPointOut:
      properties:
        period_start:
          type: string
          format: date
          title: Period Start
          description: 期間開始日
        actual:
          type: string
          title: Actual
          description: 実績値
        target_value:
          type: string
          title: Target Value
          description: 目標値
        rate:
          type: integer
          title: Rate
          description: 達成率（0〜100）
        achieved:
          type: boolean
          title: Achieved
          description: 達成済みか
      type: object
      required:
      - period_start
      - actual
      - target_value
      - rate
      - achieved
